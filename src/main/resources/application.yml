spring:
  application:
    name: payments-wallet-service

  # Java 21 virtual threads: the request path blocks on the PSP call (ideal VT workload).
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payments}
    username: ${DB_USER:payments}
    password: ${DB_PASSWORD:payments}
    hikari:
      maximum-pool-size: 20          # the bounded pool — not VT count — is the real concurrency limit
      leak-detection-threshold: 5000

  jpa:
    hibernate:
      ddl-auto: none                 # Flyway owns the schema; switch to 'validate' in M1
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: payments
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

server:
  port: 8080

psp:
  webhook:
    secret: ${PSP_WEBHOOK_SECRET:dev-webhook-secret}

reconciliation:
  delay-ms: 60000
  authorized-timeout: 30m   # AUTHORIZED holds older than this are expired (hold returned to payer)
